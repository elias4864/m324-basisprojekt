name: Docker Image Build & Artifact

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    steps:
      # 1. Code aus dem Repository holen
      - name: Code auschecken
        uses: actions/checkout@v4

      # 2. Docker Buildx für optimierte Builds einrichten
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Image bauen und als .tar exportieren
      - name: Docker Image bauen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: todo-app:latest
          outputs: type=docker,dest=/tmp/todo-app.tar

      # 4. Das erstellte Tar-Archiv als GitHub Artifact sichern
      - name: Docker-Image als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: todo-app-artifact
          path: /tmp/todo-app.tar
          retention-days: 5
