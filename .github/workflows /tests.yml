name: CI-Pipeline for Frontend Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-side: ubuntu-latest

    steps:
      # 1. Quellcode auschecken
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js Umgebung einrichten
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: 18
          cache: 'npm'

      # 3. Abhängigkeiten sauber installieren
      - name: Install Dependencies
        run: npm ci

      # 4. Automatisierte Tests ausführen
      - name: Run Tests
        run: npm test -- --watchAll=false

      # 5. Docker-Umgebung vorbereiten (Buildx)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Docker-Image testweise bauen (prüft auf Dockerfile-Fehler)
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Auf 'true' setzen, wenn du es in eine Registry (z.B. DockerHub) pushen willst
          tags: my-react-todo-app:latest
