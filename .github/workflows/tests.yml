name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    # 1. Quellcode aus dem Repository auschecken
    - name: Quellcode auschecken
      uses: actions/checkout@v4

    # 2. Node.js Umgebung einrichten
    - name: Node.js einrichten
      uses: actions/setup-node@v4
      with:
        node-node-version: '18'
        cache: 'npm'

    # 3. Abhängigkeiten sauber installieren
    - name: Abhängigkeiten installieren
      run: npm ci

    # 4. Deine automatisierten React-Tests ausführen
    # CI=true sorgt dafür, dass die Tests im CI-Modus nicht endlos laufen (kein Watch-Mode)
    - name: Tests ausführen
      run: npm test -- --watchAll=false
      env:
        CI: true

    # 5. Docker Buildx einrichten (für optimiertes Builden)
    - name: Docker Buildx einrichten
      uses: docker/setup-buildx-action@v3

    # 6. Docker Image testweise lokal builden
    - name: Docker Image bauen
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false # Auf 'true' setzen, sobald du DockerHub/GitHub Registry verknüpft hast
        tags: meine-todo-app:latest
